# Expo web export lives in App/ — set Base directory in UI to match, or rely on this file.
[build]
  base = "App"
  command = "npm ci && npx expo export -p web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Required for the app to load data on the deployed site: HTTPS API origin, no trailing slash.
  # EXPO_PUBLIC_BUDGET_API_URL = "https://your-budget-api.example.com"
